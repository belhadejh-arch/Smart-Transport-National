services:
  - type: web
    name: nqldz
    runtime: node
    region: frankfurt
    plan: starter

    buildCommand: |
      corepack enable
      corepack prepare pnpm@10 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/api-spec run codegen
      pnpm --filter @workspace/db run build || true
      pnpm --filter @workspace/api-server run build
      cd artifacts/mobile && pnpm exec expo export --platform web

    startCommand: |
      cd artifacts/api-server && WEB_DIST=$RENDER_PROJECT_DIR/artifacts/mobile/dist node --enable-source-maps ./dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
